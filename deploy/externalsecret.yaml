apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: holmesgpt-runbook-mcp-secrets
  namespace: platform-tools
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend          # adjust to your SecretStore name
    kind: ClusterSecretStore
  target:
    name: holmesgpt-runbook-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: anthropic_api_key
    - secretKey: confluence-url
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_url
    - secretKey: confluence-username
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_username
    - secretKey: confluence-api-token
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_api_token
    - secretKey: github-token
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: github_token
