apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: holmesgpt-runbook-mcp-secrets
  namespace: platform-tools
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend          # adjust to your ClusterSecretStore name
    kind: ClusterSecretStore
  target:
    name: holmesgpt-runbook-mcp-secrets
    creationPolicy: Owner
  data:
    # LLM provider API key — one of: Anthropic, OpenAI, Azure OpenAI
    - secretKey: llm-api-key
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: llm_api_key             # set to whichever provider key you use

    # Confluence
    - secretKey: confluence-url
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_url
    - secretKey: confluence-username
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_username
    - secretKey: confluence-api-token
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: confluence_api_token

    # Git provider token — GitHub PAT or GitLab personal access token
    - secretKey: git-token
      remoteRef:
        key: platform/holmesgpt-runbook-mcp
        property: git_token
